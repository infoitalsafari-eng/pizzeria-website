[build]
  command = "npm run build"
  publish = "dist"
  base = "/"
  functions = "netlify/functions"
  node_bundler = "esbuild"
  node_version = "20"

[dev]
  command = "npm run dev"
  targetPort = 5151
  port = 8888
  framework = "vite"
  autoLaunch = true

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS, PUT, UPDATE, PATH, DELETE"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Reference-Id, X-Target-Environment, Ocp-Apim-Subscription-Key"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/.*/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200